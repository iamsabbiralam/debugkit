<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Go DebugKit Dashboard</title>
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-900 text-gray-100 font-sans">

      <header class="border-b border-gray-800 bg-gray-950 p-4">
            <div class="container mx-auto flex justify-between items-center">
                  <h1 class="text-xl font-bold text-emerald-400 flex items-center gap-2">
                        🚀 Go DebugKit <span
                              class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/30">v1.0.0</span>
                  </h1>
                  <button onclick="loadData()"
                        class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-sm px-4 py-2 rounded transition-all">
                        🔄 Refresh
                  </button>
            </div>
      </header>

      <main class="container mx-auto p-6 space-y-6">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div class="bg-gray-950 border border-gray-800 p-5 rounded-xl shadow-lg">
                        <p class="text-gray-400 text-sm font-medium uppercase tracking-wider">Active Goroutines</p>
                        <p id="stat-goroutines" class="text-3xl font-extrabold text-amber-400 mt-2">0</p>
                  </div>
                  <div class="bg-gray-950 border border-gray-800 p-5 rounded-xl shadow-lg">
                        <p class="text-gray-400 text-sm font-medium uppercase tracking-wider">Allocated RAM</p>
                        <p id="stat-memory" class="text-3xl font-extrabold text-blue-400 mt-2">0 MB</p>
                  </div>
                  <div class="bg-gray-950 border border-gray-800 p-5 rounded-xl shadow-lg">
                        <p class="text-gray-400 text-sm font-medium uppercase tracking-wider">Heap Objects</p>
                        <p id="stat-heap" class="text-3xl font-extrabold text-purple-400 mt-2">0</p>
                  </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                  <div class="bg-gray-950 border border-gray-800 rounded-xl p-5 shadow-lg">
                        <h2 class="text-lg font-semibold text-gray-200 mb-4 border-b border-gray-800 pb-2">Recent
                              Requests</h2>
                        <div class="overflow-x-auto max-h-[400px]">
                              <table class="w-full text-left border-collapse">
                                    <thead>
                                          <tr
                                                class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
                                                <th class="pb-3">Method</th>
                                                <th class="pb-3">Path</th>
                                                <th class="pb-3 text-right">Duration</th>
                                                <th class="pb-3 text-center">Status</th>
                                          </tr>
                                    </thead>
                                    <tbody id="request-table-body">
                                    </tbody>
                              </table>
                        </div>
                  </div>

                  <div class="bg-gray-950 border border-gray-800 rounded-xl p-5 shadow-lg flex flex-col">
                        <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                              <h2 class="text-lg font-semibold text-gray-200">Goroutine Stack Tracer</h2>
                              <button onclick="loadStackTrace()"
                                    class="text-xs bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 px-3 py-1 rounded border border-amber-500/30 transition-all">
                                    Fetch Stack Dump
                              </button>
                        </div>
                        <pre id="stack-trace-box"
                              class="bg-black/50 text-gray-400 text-xs p-4 rounded-lg overflow-auto max-h-[360px] font-mono leading-relaxed whitespace-pre">Click "Fetch Stack Dump" to analyze goroutines...</pre>
                  </div>

            </div>

      </main>

      <script>
            async function loadData() {
                  try {
                        const res = await fetch('/debugkit/api');
                        const data = await res.json();

                        // Update metrics cards
                        document.getElementById('stat-goroutines').innerText = data.system.active_goroutines;
                        document.getElementById('stat-memory').innerText = data.system.allocated_memory;
                        document.getElementById('stat-heap').innerText = data.system.heap_objects;

                        // Update Table
                        const tbody = document.getElementById('request-table-body');
                        tbody.innerHTML = '';

                        // Reverse requests for latest first
                        data.requests.reverse().forEach(req => {
                              const statusClass = req.status >= 500 ? 'bg-red-500/20 text-red-400 border-red-500/30' :
                                    req.status >= 400 ? 'bg-orange-500/20 text-orange-400 border-orange-500/30' :
                                          'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';

                              const methodClass = req.method === 'POST' ? 'text-blue-400' : 'text-purple-400';

                              const row = `
                        <tr class="border-b border-gray-900 text-sm hover:bg-gray-900/50">
                            <td class="py-3 font-mono font-bold ${methodClass}">${req.method}</td>
                            <td class="py-3 text-gray-300 truncate max-w-[200px]">${req.path}</td>
                            <td class="py-3 text-right font-mono text-gray-400">${req.duration_ms} ms</td>
                            <td class="py-3 text-center">
                                <span class="px-2 py-0.5 rounded text-xs border font-mono ${statusClass}">${req.status}</span>
                            </td>
                        </tr>
                    `;
                              tbody.innerHTML += row;
                        });
                  } catch (err) {
                        console.error("Failed to load metrics:", err);
                  }
            }

            async function loadStackTrace() {
                  try {
                        const res = await fetch('/debugkit/goroutines');
                        const text = await res.text();
                        document.getElementById('stack-trace-box').innerText = text;
                  } catch (err) {
                        document.getElementById('stack-trace-box').innerText = "Error loading stack trace.";
                  }
            }

            // Auto-load once page is open
            window.onload = () => {
                  loadData();
            };
      </script>
</body>

</html>
